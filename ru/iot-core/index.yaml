title: Yandex IoT Core
description:
  - Сервис {{ iot-full-name }} больше не доступен для новых пользователей.
  - >-
    Текущие пользователи могут создавать ресурсы до 1 ноября 2026 года. После
    сервис перейдет в режим read-only, а 1 декабря 2026 года — прекратит работу.
  - >-
    Подробнее о сроках и порядке закрытия читайте на странице <a
    href="/docs/iot-core/sunset">Закрытие сервиса</a>.
meta:
  title: Yandex IoT Core
  description: >-
    Yandex IoT Core — это облачный отказоустойчивый MQTT-сервер, позволяющий
    наладить двустороннюю защищенную связь между устройствами и локальными или
    облачными ресурсами.
  keywords:
    - keyword: '{{ iot-full-name }}'
    - keyword: сервис {{ iot-name }}
    - keyword: iot в {{ yandex-cloud }}
    - keyword: internet of things в {{ yandex-cloud }}
    - keyword: интернет вещей в {{ yandex-cloud }}
    - keyword: iot
    - keyword: internet of things
    - keyword: интернет вещей
    - keyword: устройства в облаке
    - keyword: платформа для iot
    - keyword: облако для интернета вещей
