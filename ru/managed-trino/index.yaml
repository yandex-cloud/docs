meta:
  title: '{{ mtr-full-name }}'
  description: >-
    Сервис {{ mtr-name }} помогает разворачивать и поддерживать кластеры
    серверов {{ TR }} в инфраструктуре {{ yandex-cloud }}.
  keywords:
    - keyword: '{{ mtr-name }}'
    - keyword: '{{ mtr-full-name }}'
    - keyword: Сервис {{ mtr-name }}
    - keyword: '{{ TR }} в {{ yandex-cloud }}'
    - keyword: Кластер {{ TR }}
    - keyword: Кластеры серверов {{ TR }}
    - keyword: '{{ TR }}'
    - keyword: Трино движок
    - keyword: SQL-движок
    - keyword: '{{ TR }} в облаке'
blocks:
  - type: card-layout-block
    title: Yandex Managed Service for Trino
    description: >-
      Сервис Managed Service for Trino позволяет управлять распределенным
      аналитическим SQL-движком Trino в инфраструктуре Yandex Cloud.
    size: l
    colSizes:
      all: 12
      lg: 4
      md: 6
      sm: 12
      xl: 4
    background: ''
    children:
      - type: basic-card
        title: Начало работы
        text: Создайте свой первый кластер Trino
        icon: _assets/icons/rocket.svg
        urlTitle: Как начать работать с Yandex Managed Service for Trino
        url: quickstart
        controlPosition: content
        centered: true
        animated: false
        size: s
      - type: basic-card
        title: Пошаговые инструкции
        text: Следуйте инструкциям для выполнения рутинных операций
        icon: _assets/icons/list-ol.svg
        urlTitle: Все пошаговые инструкции для Yandex Managed Service for Trino
        url: operations/index
        controlPosition: content
        centered: true
        animated: false
        size: s
      - type: basic-card
        title: Квоты и лимиты
        text: Технические и организационные ограничения сервиса
        urlTitle: Квоты и лимиты
        url: concepts/limits
        controlPosition: content
        centered: true
        animated: false
        icon: _assets/icons/sliders.svg
        size: s
      - type: basic-card
        title: Управление доступом
        text: Настройте права доступа для работы с сервисом
        urlTitle: Управление доступом в Yandex Managed Service for Trino
        url: security
        centered: true
        controlPosition: content
        animated: false
        icon: _assets/icons/persons-lock.svg
        size: s
      - type: basic-card
        title: Правила тарификации
        text: Цены и правила расчета стоимости услуг сервиса
        urlTitle: Правила тарификации для Yandex Managed Service for Trino
        url: pricing
        centered: true
        controlPosition: content
        animated: false
        icon: _assets/icons/calculator.svg
        size: s
      - type: basic-card
        title: История изменений
        text: Перечень обновлений сервиса
        urlTitle: История изменений в Yandex Managed Service for Trino
        url: release-notes
        centered: true
        controlPosition: content
        animated: false
        icon: _assets/icons/timeline.svg
        size: s
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    background: ''
    title: Условия использования сервиса
    description: >-
      Для сервиса действует [соглашение об уровне
      обслуживания](https://yandex.ru/legal/cloud_sla/ru/).
    iconPosition: left
    children:
      - type: basic-card
        title: ''
        text: >-
          Инфраструктура Yandex Cloud защищена в соответствии со следующими
          стандартами:

          * [Федеральный закон Российской Федерации «О персональных данных»
          № 152-ФЗ](https://yandex.cloud/ru/docs/security/conform#law)


          * [ГОСТ
          57580.1-2017](https://yandex.cloud/ru/docs/security/conform#gost)

          * [Стандарт PCI
          DSS](https://yandex.cloud/ru/docs/security/conform#pci-dss)

          * [Стандарты ISO](https://yandex.cloud/ru/docs/security/conform#iso)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
      - type: basic-card
        title: ''
        text: >-
          Уровень обслуживания сервиса определен в документе:

          * [Уровень обслуживания Сервиса Управления для Trino / Yandex Managed
          Service for Trino](https://yandex.ru/legal/cloud_sla_trino/ru/)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
links: []
