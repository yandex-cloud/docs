title: '{{ stackland-full-name }}'
description:
  - >-
    Платформа контейнеризации с интегрированными PaaS‑сервисами {{ yandex-cloud
    }}. Объединяет все необходимые компоненты для централизованного управления
    микросервисными и ИИ‑приложениями.
  - >-
    Stackland базируется на Kubernetes®, что позволяет работать с привычными
    инструментами для управления микросервисными приложениями, а также управлять
    платформенными сервисами {{ yandex-cloud }} через Kubernetes API.
  - >-
    В платформу интегрированы объектное хранилище, {{ mpg-name }}, {{ mch-name
    }}, {{ mkf-name }}, а также готовый инструментарий для обеспечения
    приложений доступом к графическим ускорителям и высокопроизводительным сетям
    для задач распределенного инференса. Запланирована интеграция баз данных с
    поддержкой векторного поиска для RAG-сценариев.
  - >-
    Платформа позволит быстро развернуть в закрытом контуре {{
    foundation-models-name }} для разработки AI-приложений и агентов, а также {{
    speechsense-name }} для речевой аналитики и BI-систему {{ datalens-name }}.
