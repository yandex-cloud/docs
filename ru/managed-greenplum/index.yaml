title: '{{ mgp-full-name }}'
description:
  - >-
    Сервис {{ mgp-full-name }} помогает разворачивать и поддерживать кластеры с
    СУБД Greenplum<sup>®</sup> версии 6 и выше и Apache Cloudberry<sup>™</sup> в
    инфраструктуре {{ yandex-cloud }}.
  - >-
    Greenplum<sup>®</sup> — аналитическая колоночная массово-параллельная (<a
    href="https://ru.wikipedia.org/wiki/Массово-параллельная_архитектура">MPP</a>)
    СУБД. MPP-архитектура позволяет хранить и обрабатывать данные на множестве
    узлов параллельно. Это отличает Greenplum<sup>®</sup> от систем, основанных
    на симметричной многопроцессорности (<a
    href="https://ru.wikipedia.org/wiki/Симметричная_многопроцессорность">SMP</a>),
    в которых масштабирование ограничено одним узлом.
  - >-
    В {{ mgp-full-name }} также доступна СУБД <a
    href="https://cloudberry.apache.org">Apache Cloudberry<sup>™</sup></a>. Она
    основана на Greenplum<sup>®</sup> версии 7 и будет базовым дистрибутивом для
    новых мажорных версий ядра сервиса.
  - >-
    Подробнее о Greenplum<sup>®</sup>, Apache Cloudberry<sup>™</sup> и {{
    mgp-full-name }} см. в разделе <a
    href="/docs/managed-greenplum/concepts/overview">Обзор</a>.
  - >-
    Инфраструктура {{ yandex-cloud }} <a
    href="/docs/security/conform">защищена</a> в соответствии со следующими
    стандартами:
  - "<ul><li>Федеральный закон Российской Федерации «О персональных данных» № 152-ФЗ.</li> <li>Стандарт безопасности индустрии платежных карт (PCI\_DSS).</li> <li>Стандарт ISO 27001.</li> <li>Стандарт ISO 27017.</li> <li>Стандарт ISO 27018.</li> <li>ГОСТ 57580.1-2017.</li></ul>"
  - >-
    Для сервиса действует <a
    href="https://yandex.ru/legal/cloud_sla/ru">соглашение об уровне
    обслуживания</a>. Уровень обслуживания сервиса определен в документе <a
    href="https://yandex.ru/legal/cloud_sla_greenplum/ru">Уровень обслуживания
    Сервиса Управления MPP PostgreSQL / Yandex MPP Analytics for PostgreSQL</a>.
  - >-
    <em>Greenplum<sup>®</sup> и Greenplum Database<sup>®</sup> являются
    зарегистрированными товарными знаками или товарными знаками Broadcom Inc в
    США и/или других странах.</em>
  - >-
    <em>Apache<sup>®</sup> и Apache Cloudberry<sup>™</sup> являются
    зарегистрированными товарными знаками или товарными знаками Apache Software
    Foundation в США и/или других странах.</em>
