meta:
  title: Yandex Managed Service for Apache Airflow™
  description: >-
    Сервис Yandex Managed Service for Apache Airflow™ помогает разворачивать и
    поддерживать кластеры серверов Apache Airflow™ в инфраструктуре Yandex
    Cloud.
  keywords:
    - keyword: airflow
    - keyword: кластер airflow
    - keyword: кластер {{ AF }}
    - keyword: '{{ AF }}'
    - keyword: Apache Airflow
    - keyword: кластеры серверов Apache Airflow
    - keyword: кластеры серверов {{ AF }}
    - keyword: airflow в {{ yandex-cloud }}
    - keyword: Apache Airflow в {{ yandex-cloud }}
    - keyword: '{{ AF }} в {{ yandex-cloud }}'
    - keyword: сервис {{ maf-name }}
blocks:
  - type: card-layout-block
    title: Yandex Managed Service for Apache Airflow™
    description: >-
      Сервис Managed Service for Apache Airflow™ помогает разворачивать и
      поддерживать кластеры серверов Apache Airflow™ в инфраструктуре Yandex
      Cloud.
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    background: ''
    children:
      - type: basic-card
        title: Начало работы
        text: Создайте свой первый кластер
        icon: _assets/icons/rocket.svg
        urlTitle: Как начать работать с Yandex Managed Service for Apache Airflow™
        url: quickstart
        centered: true
        size: s
      - type: basic-card
        title: Пошаговые инструкции
        text: Следуйте инструкциям для выполнения рутинных операций
        icon: _assets/icons/list-ol.svg
        urlTitle: >-
          Все пошаговые инструкции для Yandex Managed Service for Apache
          Airflow™
        url: operations/index
        centered: true
        size: s
      - type: basic-card
        title: Концепции
        text: Изучите основные термины и понятия, используемые в сервисе
        icon: _assets/icons/bookmark.svg
        urlTitle: Все понятия в Yandex Managed Service for Apache Airflow™
        url: concepts/index
        centered: true
        size: s
      - type: basic-card
        title: Практические руководства
        text: Решайте типовые задачи при помощи сервиса
        icon: _assets/icons/book.svg
        urlTitle: Практические руководства Yandex Managed Service for Apache Airflow™
        url: tutorials/index
        centered: true
        size: s
      - type: basic-card
        title: Правила тарификации
        text: Цены и правила расчета стоимости услуг
        icon: _assets/icons/calculator.svg
        urlTitle: Правила тарификации для Yandex Managed Service for Apache Airflow™
        url: pricing
        centered: true
        size: s
      - type: basic-card
        title: Управление доступом
        text: Настройте права доступа для работы с сервисом
        icon: _assets/icons/persons-lock.svg
        urlTitle: Управление доступом в Yandex Managed Service for Apache Airflow™
        url: security/index
        centered: true
        size: s
      - type: basic-card
        title: Справочник API (англ.)
        text: "Используйте методы HTTP\_API для управления кластерами"
        icon: _assets/icons/code.svg
        urlTitle: "Описание методов HTTP\_API"
        url: api-ref/authentication
        centered: true
        size: s
      - type: basic-card
        title: История изменений
        text: Перечень обновлений сервиса
        icon: _assets/icons/timeline.svg
        urlTitle: История изменений в Yandex Managed Service for Apache Airflow™
        url: release-notes
        centered: true
        size: s
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    background: ''
    title: Условия использования сервиса
    description: >-
      Для сервиса действует [соглашение об уровне
      обслуживания](https://yandex.ru/legal/cloud_sla/ru/).
    iconPosition: left
    children:
      - type: basic-card
        title: ''
        text: >-
          Инфраструктура Yandex Cloud защищена в соответствии со следующими
          стандартами:

          * [Федеральный закон Российской Федерации «О персональных данных»
          № 152-ФЗ](https://yandex.cloud/ru/docs/security/conform#law)


          * [ГОСТ
          57580.1-2017](https://yandex.cloud/ru/docs/security/conform#gost)

          * [Стандарт PCI
          DSS](https://yandex.cloud/ru/docs/security/conform#pci-dss)

          * [Стандарты ISO](https://yandex.cloud/ru/docs/security/conform#iso)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
      - type: basic-card
        title: ''
        text: >-
          Уровень обслуживания сервиса определен в документе:

          * [Уровень обслуживания Сервиса Управления для Apache Airflow™ /
          Yandex Managed Service for Apache
          Airflow™](https://yandex.ru/legal/cloud_sla_airflow/ru/)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
  - type: content-layout-block
    textContent:
      title: ''
      text: >-
        _Apache® и Apache Airflow™ являются зарегистрированными товарными
        знаками или товарными знаками Apache Software Foundation в США и/или
        других странах._
