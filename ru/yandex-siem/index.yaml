title: '{{ yandex-siem-full-name }}'
description:
  - >-
    Сервис {{ yandex-siem-full-name }} — это собственная SIEM-система {{
    yandex-cloud }} для мониторинга и анализа событий безопасности в облачной
    инфраструктуре. {{ yandex-siem-full-name }} собирает данные с облачной
    инфраструктуры для выявления аномалий. При обнаружении аномалий {{
    yandex-siem-full-name }} создает <a
    href="https://yandex.cloud/ru/docs/security-deck/concepts/alerts">алерты</a>,
    указывающие на потенциальный инцидент.
