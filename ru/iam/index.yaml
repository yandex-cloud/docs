meta:
  title: Yandex Identity and Access Management
  description: >-
    Сервис Yandex Identity and Access Management (IAM) — это сервис
    идентификации и контроля доступа, который помогает централизованно управлять
    правами доступа пользователей к вашим ресурсам Yandex Cloud.
  keywords:
    - keyword: '{{ iam-short-name }}'
    - keyword: '{{ iam-name }}'
    - keyword: '{{ iam-full-name }}'
    - keyword: сервис {{ iam-name }}
    - keyword: идентификация в {{ yandex-cloud }}
    - keyword: контроль доступа в {{ yandex-cloud }}
    - keyword: управление доступом в {{ yandex-cloud }}
    - keyword: идентификация и контроль доступа
    - keyword: управление правами пользователей
    - keyword: управление доступами
blocks:
  - type: card-layout-block
    title: Yandex Identity and Access Management
    description: "Сервис Yandex\_Identity\_and\_Access\_Management\_(IAM)\_—\_это\_сервис идентификации и контроля доступа, который помогает централизованно управлять правами доступа пользователей к вашим ресурсам Yandex\_Cloud. Благодаря IAM все операции над ресурсами выполняются только пользователями с необходимыми правами.\n\nИнфраструктура Yandex Cloud [защищена](https://storage.yandexcloud.net/yc-compliance/conformance_ru_pdp.pdf) в соответствии с Федеральным законом Российской Федерации «О персональных данных» № 152-ФЗ."
    colSizes:
      all: 12
      lg: 4
      sm: 4
    children:
      - type: basic-card
        title: Начало работы
        text: Добавьте пользователя и назначьте ему роль
        size: s
        urlTitle: "Как начать работать с Yandex\_Identity and Access\_Management"
        url: quickstart-overview
        icon: _assets/icons/rocket.svg
        controlPosition: content
        animated: false
