meta:
  title: '{{ msp-full-name }}'
  description: >-
    Сервис {{ msp-full-name }} помогает разворачивать и поддерживать кластеры {{
    SPRK }} в инфраструктуре {{ yandex-cloud }}.
  keywords:
    - keyword: Apache Spark
    - keyword: кластер spark
    - keyword: кластеры {{ SPRK }}
    - keyword: '{{ msp-full-name }}'
    - keyword: Spark
    - keyword: кластеры серверов Apache Spark
    - keyword: кластеры серверов {{ msp-full-name }}
    - keyword: spark в {{ yandex-cloud }}
    - keyword: Apache Spark в {{ yandex-cloud }}
    - keyword: '{{ msp-full-name }} в {{ yandex-cloud }}'
    - keyword: сервис {{ msp-full-name }}
blocks:
  - type: card-layout-block
    title: Yandex Managed Service for Apache Spark™
    description: >-
      Сервис Yandex Managed Service for Apache Spark™ помогает разворачивать
      кластеры Apache Spark™ в инфраструктуре Yandex Cloud и позволяет запускать
      задания Spark.
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    background: ''
    children:
      - type: basic-card
        title: Начало работы
        text: Создайте свой первый кластер Apache Spark™
        icon: _assets/icons/rocket.svg
        urlTitle: Как начать работать с Yandex Managed Service for Apache Spark™
        url: quickstart
        centered: true
        size: s
      - type: basic-card
        title: Пошаговые инструкции
        text: Следуйте инструкциям для выполнения рутинных операций
        icon: _assets/icons/list-ol.svg
        urlTitle: Все пошаговые инструкции для Yandex Managed Service for Apache Spark™
        url: operations/index
        centered: true
        size: s
      - type: basic-card
        title: Практические руководства
        text: Решайте типовые задачи при помощи сервиса
        icon: _assets/icons/book.svg
        urlTitle: Практические руководства Yandex Managed Service for Apache Spark™
        url: tutorials/index
        centered: true
        size: s
      - type: basic-card
        title: Справочник API (англ.)
        text: "Используйте методы HTTP\_API для управления кластерами"
        icon: _assets/icons/code.svg
        urlTitle: "Описание методов HTTP\_API"
        url: api-ref/authentication
        centered: true
        size: s
      - type: basic-card
        title: Правила тарификации
        text: Цены и правила расчета стоимости услуг
        icon: _assets/icons/calculator.svg
        urlTitle: Правила тарификации для Yandex Managed Service for Apache Spark™
        url: pricing
        centered: true
        size: s
      - type: basic-card
        title: Квоты и лимиты
        text: Технические и организационные ограничения сервиса
        icon: _assets/icons/sliders.svg
        urlTitle: Квоты в Yandex Managed Service for Apache Spark™
        url: concepts/limits
        centered: true
        size: s
      - type: basic-card
        title: Управление доступом
        text: Настройте права доступа для работы с сервисом
        icon: _assets/icons/persons-lock.svg
        urlTitle: Управление доступом в Yandex Managed Service for Apache Spark™
        url: security
        centered: true
        size: s
      - type: basic-card
        title: История изменений
        text: Перечень обновлений сервиса
        icon: _assets/icons/timeline.svg
        urlTitle: История изменений в Yandex Managed Service for Apache Spark™
        url: release-notes
        centered: true
        size: s
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    background: ''
    title: Условия использования сервиса
    description: >-
      Для сервиса действует [соглашение об уровне
      обслуживания](https://yandex.ru/legal/cloud_sla/ru/).
    iconPosition: left
    children:
      - type: basic-card
        title: ''
        text: >-
          Инфраструктура Yandex Cloud защищена в соответствии со следующими
          стандартами:

          * [Федеральный закон Российской Федерации «О персональных данных»
          № 152-ФЗ](https://yandex.cloud/ru/docs/security/conform#law)


          * [ГОСТ
          57580.1-2017](https://yandex.cloud/ru/docs/security/conform#gost)

          * [Стандарт PCI
          DSS](https://yandex.cloud/ru/docs/security/conform#pci-dss)

          * [Стандарты ISO](https://yandex.cloud/ru/docs/security/conform#iso)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
      - type: basic-card
        title: ''
        text: >-
          Уровень обслуживания сервиса определен в документе:

          * [Уровень обслуживания Сервиса Управления для Spark / Yandex Managed
          Service for Apache
          Spark™](https://yandex.ru/legal/cloud_sla_spark/ru/)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
  - type: content-layout-block
    textContent:
      title: ''
      text: >-
        _Apache® и Apache Spark™ являются зарегистрированными товарными знаками
        или товарными знаками Apache Software Foundation в США и/или других
        странах._
links: []
