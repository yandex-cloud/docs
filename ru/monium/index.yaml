title: Monium
description:
  - >-
    Monium платформа для сбора, хранения и анализа телеметрии (метрик, логов и
    трейсов) облачных ресурсов и приложений, расположенных в любой
    инфраструктуре. Помогает следить за состоянием сервисов, получать
    уведомления о проблемах, находить причины сбоев и расследовать инциденты.
  - >-
    Для сервиса действует <a href="https://yandex.ru/legal/cloud_sla">соглашение
    об уровне обслуживания</a>. Уровень обслуживания сервиса определен в
    документе <a href="https://yandex.ru/legal/cloud_sla_monium">Уровень
    обслуживания Yandex Monitoring</a>.
meta:
  title: Monium
  description: >-
    Monium позволяет собирать, хранить, анализировать и визуализировать данные о
    состоянии и производительности ваших ресурсов и приложений.
  keywords:
    - keyword: monitoring
    - keyword: мониторинг
    - keyword: метрика {{ monitoring-name }}
    - keyword: сервис {{ monitoring-name }}
    - keyword: '{{ monitoring-name }}'
    - keyword: алертинг
    - keyword: временной ряд в {{ monitoring-name }}
    - keyword: дашборд в {{ monitoring-name }}
    - keyword: '{{ monitoring-name }} в {{ yandex-cloud }}'
    - keyword: агент сбора метрик
    - keyword: '{{ unified-agent-short-name }}'
    - keyword: '{{ unified-agent-full-name }}'
    - keyword: '{{ prometheus-name }}'
    - keyword: канал уведомлений в {{ monitoring-name }}
