title: Yandex MetaData Hub
description:
  - >-
    Yandex MetaData Hub — сервис Yandex Cloud, предоставляющий клиентам
    возможности управления подключениями к базам данных, хранения схем обмена
    данными и описания наборов данных, а также систему управления метаданными.
  - >-
    <em>Apache® и <a href="https://hive.apache.org/">Apache Hive™</a> являются
    зарегистрированными товарными знаками или товарными знаками Apache Software
    Foundation в США и/или других странах.</em>
meta:
  title: Yandex MetaData Hub
  description: >-
    Yandex MetaData Hub — сервис Yandex Cloud, предоставляющий клиентам
    возможности управления подключениями к базам данных, хранения схем обмена
    данными и описания наборов данных.
  keywords:
    - keyword: '{{ metadata-hub-name }}'
    - keyword: сервис {{ metadata-hub-name }}
