title: Yandex IoT Core
description:
  - '{{ iot-full-name }} is no longer available to new users.'
  - >-
    Current users can create resources until November 1, 2026. Afterwards, the
    service will go read-only and cease to operate on December 1, 2026.
  - >-
    For more information on the timing and procedure, see <a
    href="/docs/iot-core/sunset">Service shutdown</a>.
meta:
  title: Yandex IoT Core
  description: >-
    Yandex IoT Core is a cloud-based fault-tolerant MQTT server for secure
    two-way communication between your devices and local or cloud resources.
