title: Yandex Managed Service for ClickHouse<sup>®</sup>
description:
  - >-
    With Yandex Managed Service for ClickHouse<sup>®</sup>, you can deploy and
    maintain <a href="https://clickhouse.com">ClickHouse<sup>®</sup></a> server
    clusters in the {{ yandex-cloud }} infrastructure. ClickHouse<sup>®</sup> is
    a high-performance open-source column-oriented DBMS.
  - >-
    Managed Service for ClickHouse<sup>®</sup> allows you to: <ul><li>Create
    systems that can process and store massive amounts of data.</li> <li>Process
    transactions in real time (OLTP).</li> <li>Process analytical queries online
    (OLAP).</li> <li>Support and operate systems that require linear scaling,
    both vertical and horizontal.</li> <li>Use parallel query processing on
    multiple processor cores.</li></ul>
  - >-
    You can interact with the service through the management console, the {{
    yandex-cloud }} command-line interface (CLI), API, or <a
    href="https://clickhouse.com/docs/en/interfaces/http">HTTP interface</a>.
    Managed Service for ClickHouse<sup>®</sup> allows you to visualize the data
    structure in your ClickHouse<sup>®</sup> cluster and send SQL queries
    against databases from the {{ yandex-cloud }} <a
    href="/docs/managed-clickhouse/operations/web-sql-query">management
    console</a>.
  - >-
    The {{ yandex-cloud }} infrastructure is <a
    href="/docs/security/conform">protected</a> pursuant to the following
    standards:
  - "<ul><li>Russian Federal Law No.\_152-FZ on Personal Data</li> <li>Payment Card Industry Data Security Standard (PCI\_DSS)</li> <li>ISO 27001</li> <li>ISO 27017</li> <li>ISO 27018</li> <li>GOST 57580.1-2017</li></ul>"
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla">service level agreement</a>.
  - >-
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_mdb">Yandex Managed Databases
    Service Level</a>.
  - >-
    <em>ClickHouse<sup>®</sup> is a registered trademark of <a
    href="https://clickhouse.com" target="_blank">ClickHouse, Inc.</a></em>
