blocks:
  - type: card-layout-block
    title: Yandex Managed Service for Apache Spark™
    description: >-
      Yandex Managed Service for Apache Spark™ helps to deploy Apache Spark™
      clusters on Yandex Cloud infrastructure and run Spark jobs.
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    background: ''
    children:
      - type: basic-card
        title: Getting started
        text: Create your first Apache Spark™ cluster
        icon: _assets/icons/rocket.svg
        urlTitle: Getting started with Yandex Managed Service for Apache Spark™
        url: quickstart
        centered: true
        size: s
      - type: basic-card
        title: Step-by-step guides
        text: Follow our guides for routine operations
        icon: _assets/icons/list-ol.svg
        urlTitle: All step-by-step guides for Yandex Managed Service for Apache Spark™
        url: operations/index
        centered: true
        size: s
      - type: basic-card
        title: Tutorials
        text: Address common tasks with the help of the service
        icon: _assets/icons/book.svg
        urlTitle: Yandex Managed Service for Apache Spark™ tutorials
        url: tutorials/index
        centered: true
        size: s
      - type: basic-card
        title: Pricing policy
        text: Pricing and cost calculations
        icon: _assets/icons/calculator.svg
        urlTitle: Yandex Managed Service for Apache Spark™ pricing policy
        url: pricing
        centered: true
        size: s
      - type: basic-card
        title: Quotas and limits
        text: Technical and organizational limitations
        icon: _assets/icons/sliders.svg
        urlTitle: Yandex Managed Service for Apache Spark™ quotas
        url: concepts/limits
        centered: true
        size: s
      - type: basic-card
        title: Manage access
        text: Configure access permissions for the service
        icon: _assets/icons/persons-lock.svg
        urlTitle: Access management in Yandex Managed Service for Apache Spark™
        url: security
        centered: true
        size: s
      - type: basic-card
        title: Release notes
        text: Releases and updates
        icon: _assets/icons/timeline.svg
        urlTitle: Yandex Managed Service for Apache Spark™ release notes
        url: release-notes
        centered: true
        size: s
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    background: ''
    title: Terms of use
    description: >-
      This service is subject to a [service level
      agreement](https://yandex.com/legal/cloud_sla/en/).
    iconPosition: left
    children:
      - type: basic-card
        title: ''
        text: >-
          The Yandex Cloud infrastructure protection complies with the following
          standards:

          * [Federal Law No. 152-FZ on Personal
          Data](https://yandex.cloud/en/docs/security/conform#law)


          * [GOST
          57580.1-2017](https://yandex.cloud/en/docs/security/conform#gost)

          * [PCI DSS](https://yandex.cloud/en/docs/security/conform#pci-dss)

          * [ISO standards](https://yandex.cloud/en/docs/security/conform#iso)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
      - type: basic-card
        title: ''
        text: >-
          The service level is set out in the document titled

          * [Yandex Managed Service for Apache Spark™ Service
          Level](https://yandex.com/legal/cloud_sla_spark/en/)
        icon: _assets/icons/file-text.svg
        centered: true
        size: s
  - type: content-layout-block
    textContent:
      title: ''
      text: >-
        _Apache® and Apache Spark™ are registered trademarks or trademarks of
