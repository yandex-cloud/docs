meta:
  title: Yandex Managed Service for Apache Kafka®
  description: >-
    Yandex Managed Service for Apache Kafka® helps you deploy and maintain
    Apache Kafka® {{ versions.console.str }} server clusters in the Yandex Cloud
    infrastructure.
  keywords:
    - keyword: Apache Kafka
    - keyword: Kafka
    - keyword: '{{ mkf-name }} cluster'
    - keyword: '{{ mkf-name }}'
    - keyword: broker host
    - keyword: KRaft
    - keyword: '{{ mkf-name }} server clusters'
    - keyword: Kafka in {{ yandex-cloud }}
    - keyword: Apache Kafka in {{ yandex-cloud }}
    - keyword: '{{ mkf-name }} in {{ yandex-cloud }}'
    - keyword: '{{ mkf-name }}'
blocks:
  - type: card-layout-block
    title: Yandex Managed Service for Apache Kafka®
    description: >-
      Yandex Managed Service for Apache Kafka® helps you deploy and maintain
      Apache Kafka® 3.6, 3.7, 3.8, 3.9, or 4.0 server clusters in the Yandex
      Cloud infrastructure.
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    background: ''
    children:
      - type: basic-card
        title: Getting started
        text: Create your first cluster
        icon: _assets/icons/rocket.svg
        urlTitle: Getting started with Managed Service for Apache Kafka®
        url: quickstart
        centered: true
        size: s
      - type: basic-card
        title: Step-by-step guides
        text: Follow our guides for routine operations
        icon: _assets/icons/list-ol.svg
        urlTitle: All step-by-step guides for Managed Service for Apache Kafka®
        url: operations/index
        centered: true
        size: s
      - type: basic-card
        title: Concepts
        text: Introduction to the basic terms and concepts
        icon: _assets/icons/bookmark.svg
        urlTitle: All concepts
        url: concepts/index
        centered: true
        size: s
      - type: basic-card
        title: Tutorials
        text: Address common tasks with the help of the service
        icon: _assets/icons/book.svg
        urlTitle: Yandex Managed Service for Apache Kafka® tutorials
        url: tutorials/index
        centered: true
        size: s
      - type: basic-card
        title: Pricing policy
        text: Pricing and cost calculations
        icon: _assets/icons/calculator.svg
        urlTitle: Pricing policy for Managed Service for Apache Kafka®
        url: pricing
        centered: true
        size: s
      - type: basic-card
        title: Quotas and limits
        text: Technical and organizational limitations
        icon: _assets/icons/sliders.svg
        urlTitle: Quotas in Managed Service for Apache Kafka®
        url: concepts/limits
        centered: true
        size: s
      - type: basic-card
        title: Manage access
        text: Configure access permissions for the service
        icon: _assets/icons/persons-lock.svg
        urlTitle: Access management in Managed Service for Apache Kafka®
        url: security/index
        centered: true
        size: s
      - type: basic-card
        title: Release notes
        text: Releases and updates
        icon: _assets/icons/timeline.svg
        urlTitle: Yandex Managed Service for Apache Kafka® release notes
        url: release-notes
        centered: true
        size: s
