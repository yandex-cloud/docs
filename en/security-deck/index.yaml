blocks:
  - type: content-layout-block
    textContent:
      title: Yandex Security Deck
      text: >-
        Yandex Security Deck is at the [Preview
        stage](https://yandex.cloud/en/docs/overview/concepts/launch-stages).


        Its tools allow you to monitor and respond to incidents, detect
        container image vulnerabilities, manage cloud infrastructure
        configuration and container security, monitor and protect access to
        data, and enforce compliance with regulations and industry standards.
    size: l
  - type: icons-block
    size: m
    items:
      - src: _assets/image/cspm-base-yc.svg
        text: "Yandex\_Cloud basic security rules"
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/yc-security-baseline
      - src: _assets/image/cspm-standard-yc.svg
        text: Infrastructure security standard
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/yc-cloud-security-standard
      - src: _assets/image/cspm-152-fz.svg
        text: 152-FZ (Russian Federal Law on Personal Data)
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/yc-personal-data-protection
      - src: _assets/image/cspm-cis-k8s-standard.svg
        text: "CIS\_Benchmark™ for Kubernetes"
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/cis-kubernetes-benchmark
      - src: _assets/image/cspm-pci-dss.svg
        text: "Payment\_Card Industry\_Data Security\_Standard"
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/yc-pci-dss
      - src: _assets/image/cspm-gost.svg
        text: "GOST\_R\_57580"
        url: >-
          https://yandex.cloud/en/docs/security-deck/concepts/standard-compliance/yc-gost-57580
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    size: m
    background: ''
    children:
      - type: basic-card
        title: Getting started
        text: Set up the first environment
        icon: _assets/icons/rocket.svg
        urlTitle: Getting started with Yandex Security Deck
        url: quickstart-overview
        centered: true
        size: s
        animated: false
      - type: basic-card
        title: Pricing policy
        text: Review prices and service plans
        icon: _assets/icons/calculator.svg
        urlTitle: Yandex Security Deck pricing policy
        url: pricing
        centered: true
        size: s
        animated: false
      - type: basic-card
        title: Manage access
        text: Configure access permissions for the service
        icon: _assets/icons/persons-lock.svg
        urlTitle: Access management in Yandex Security Deck
        url: security/index
        centered: true
        size: s
        animated: false
      - type: basic-card
        title: Release notes
        text: Updates and changes
        icon: _assets/icons/timeline.svg
        urlTitle: Yandex Security Deck release notes
        url: release-notes
        centered: true
        size: s
        animated: false
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    size: m
    background: ''
    title: Yandex Security Deck modules
    children:
      - type: basic-card
        title: Data management with DSPM
        text: "Inventory and discovery of sensitive data in Object Storage and Yandex Disk\_360 buckets"
        urlTitle: Data management with DSPM
        url: concepts/dspm
        size: s
        icon: _assets/icons/dspm.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Kubernetes® Security Posture Management (KSPM)
        text: Security of containerized applications
        urlTitle: Kubernetes® Security Posture Management (KSPM)
        url: concepts/kspm
        size: s
        icon: _assets/icons/kspm.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Cloud Infrastructure Entitlement Management (CIEM)
        text: Auditing access permissions
        urlTitle: Cloud Infrastructure Entitlement Management (CIEM)
        url: concepts/ciem
        size: s
        icon: _assets/icons/ciem.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Cloud Security Posture Management (CSPM)
        text: Infrastructure security compliance verification
        urlTitle: Cloud Security Posture Management (CSPM)
        url: concepts/cspm
        size: s
        icon: _assets/icons/cspm.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Threat detection (TD)
        text: Suspicious activity detection and threat notifications
        urlTitle: Threat detection (TD)
        url: concepts/threat-detector
        size: s
        icon: _assets/icons/td.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Vulnerability management (VM)
        text: Scanning container images for vulnerabilities
        urlTitle: Vulnerability management (VM)
        url: concepts/vulnerability-management
        size: s
        icon: _assets/icons/vm.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Access Transparency
        text: Monitoring Yandex Cloud team actions on user resources
        urlTitle: Access Transparency
        url: concepts/access-transparency
        size: s
        icon: _assets/icons/at.svg
        iconPosition: left
        animated: false
      - type: basic-card
        title: Alerts
        text: Unified alert viewing interface
        urlTitle: Alerts
        url: concepts/alerts
        size: s
        icon: _assets/icons/alerts.svg
        iconPosition: left
        animated: false
links: []
