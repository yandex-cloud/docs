title: '{{ mmg-full-name }}'
description:
  - >-
    The service helps you deploy and maintain {{ mmg-name }} server clusters
    (versions 6.0 and 7.0) in the {{ yandex-cloud }} infrastructure. {{ mmg-name
    }} is a {{ MG }}-compatible, high-performance, open-source NoSQL DBMS.
  - >-
    With {{ mmg-full-name }}, you can: <ul> <li>Build systems for processing and
    storing large volumes of semi-structured and unstructured data without a
    predefined schema.</li> <li>Maintain and operate systems requiring both
    vertical and horizontal scalability.</li> <li>Analyze both regular and big
    data, in real time.</li> <li>Process transactions in real time (OLTP).</li>
    <li>Process analytical queries online (OLAP).</li> <li>Use full-text
    search.</li> </ul>
  - >-
    You can interact with the service through the management console, the {{
    yandex-cloud }} command-line interface (CLI), API, or {{ TF }}.
  - >-
    The {{ yandex-cloud }} infrastructure is <a
    href="/docs/security/conform">protected</a> pursuant to the following
    standards:
  - "<ul> <li>Russian Federal Law No.\_152-FZ on Personal Data</li> <li>Payment Card Industry Data Security Standard (PCI\_DSS)</li> <li>ISO 27001</li> <li>ISO 27017</li> <li>ISO 27018</li> <li>GOST 57580.1-2017</li> </ul>"
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla/en/">service level agreement</a>.
  - >-
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_mdb">Yandex Managed Databases
    Service Level</a>.
