title: Yandex StoreDoc
description:
  - >-
    Use our service to deploy and maintain Yandex StoreDoc 6.0 and 7.0 server
    clusters within Yandex Cloud. Yandex StoreDoc is a MongoDB-compatible,
    high-performance, open-source NoSQL DBMS.
  - >-
    With Yandex StoreDoc, you can: <ul> <li>Build systems for processing and
    storing large volumes of semi-structured and unstructured data, without
    predefined schemas.</li> <li>Maintain and operate systems requiring both
    vertical and horizontal scalability.</li> <li>Analyze both regular and big
    data, in real time.</li> <li>Process transactions in real time <a
    href="/docs/glossary/oltp">(OLTP)</a>.</li> <li>Process analytical queries
    online <a href="/docs/glossary/olap">(OLAP)</a>.</li> <li>Use full-text
    search.</li> </ul>
  - >-
    You can interact with the service via the management console, Yandex Cloud
    CLI, API, or Terraform.
  - >-
    The Yandex Cloud infrastructure <a
    href="/docs/security/conform">protection</a> complies with the following
    standards:
  - "<ul> <li>Russian Federal Law No.\_152-FZ on Personal Data</li> <li>Payment Card Industry Data Security Standard (PCI\_DSS)</li> <li>ISO 27001</li> <li>ISO 27017</li> <li>ISO 27018</li> <li>GOST 57580.1-2017</li> </ul>"
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla">service level agreement</a>.
  - >-
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_mdb">Yandex Managed Databases
    Service Level</a>.
