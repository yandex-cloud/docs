title: Yandex Certificate Manager
description:
  - >-
    Yandex Certificate Manager is a service for issuing and renewing Let's
    Encrypt TLS certificates and uploading your custom certificates you can use
    to access websites, API Gateways instances, and Cloud CDN resources over
    HTTPS, as well as handling TLS traffic in Application Load Balancer.
