title: Monium
description:
  - >-
    Monium allows you to collect, store, analyze, and visualize the status and
    performance data of your resources and applications.
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla/en/">service level agreement</a>.
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_monium/en/">Yandex Monitoring
    Service Level</a>.
