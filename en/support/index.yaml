title: Yandex Cloud technical support description
description:
  - >-
    Yandex Cloud provides technical support in accordance with the <a
    href="https://yandex.ru/legal/cloud_technicalregulations">Maintenance
    Regulations</a> in Russian and English.
  - >-
    <a href="https://center.yandex.cloud/support">Yandex Cloud Center</a> is the
    main entry point for troubleshooting and answers to questions about YC
    services.
  - >-
    This document explains how to work with the Cloud Center to get support,
    details technical support levels and current service plans.
