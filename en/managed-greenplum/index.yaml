title: '{{ mgp-full-name }}'
description:
  - "{{ mgp-full-name }} helps you deploy and maintain clusters running Greenplum<sup>®</sup>\_6 or higher and Apache Cloudberry<sup>™</sup> in the {{ yandex-cloud }} infrastructure."
  - >-
    Greenplum<sup>®</sup> is an analytical, column-oriented massively parallel
    processing (<a
    href="https://en.wikipedia.org/wiki/Massively_parallel">MPP</a>) DBMS. With
    the MPP architecture, you can store and process data on multiple nodes in
    parallel. This sets Greenplum<sup>®</sup> apart from symmetric
    multiprocessing (<a
    href="https://en.wikipedia.org/wiki/Symmetric_multiprocessing">SMP</a>)
    systems, where scaling is limited to a single node.
  - >-
    {{ mgp-full-name }} also supports <a
    href="https://cloudberry.apache.org">Apache Cloudberry<sup>™</sup></a>.
    Based on Greenplum<sup>®</sup> version 7, it will be the basic distribution
    for new major versions of the core.
  - >-
    Learn more about Greenplum<sup>®</sup>, Apache Cloudberry<sup>™</sup>, and
    {{ mgp-full-name }} in the <a
    href="/docs/managed-greenplum/concepts/overview">Overview</a> section.
  - >-
    The {{ yandex-cloud }} infrastructure is <a
    href="/docs/security/conform">protected</a> pursuant to the following
    standards:
  - "<ul><li>Russian Federal Law No.\_152-FZ on Personal Data</li> <li>Payment Card Industry Data Security Standard (PCI\_DSS)</li> <li>ISO 27001</li> <li>ISO 27017</li> <li>ISO 27018</li> <li>GOST 57580.1-2017</li></ul>"
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla/en/">service level agreement</a>.
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_greenplum/en/">Service Level of
    Yandex MPP Analytics for PostgreSQL</a>.
  - >-
    <em>Greenplum<sup>®</sup> and Greenplum Database<sup>®</sup> are registered
    trademarks or trademarks of Broadcom Inc. in the United States and/or other
    countries.</em>
  - >-
    <em>Apache<sup>®</sup> and Apache Cloudberry<sup>™</sup> are registered
    trademarks or trademarks of Apache Software Foundation in the United States
    and/or other countries.</em>
