title: '{{ stackland-full-name }}'
description:
  - >-
    Containerization platform with {{ yandex-cloud }} PaaS services on board.
    All the components you need to manage microservice and AI apps in a
    centralized way.
  - >-
    Stackland is based on Kubernetes®, which allows you to use familiar
    microservice app management tools and manage {{ yandex-cloud }} PaaS
    services via the Kubernetes API.
  - >-
    Stackland integrates an object storage, {{ mpg-name }}, {{ mch-name }}, and
    {{ mkf-name }}, as well as an out-of-the-box toolkit for apps to leverage
    GPUs and high-performance networks for distributed inference tasks. Database
    integration with vector search support for RAG scenarios is coming soon.
  - >-
    The platform will facilitate quick in-house deployment of {{
    foundation-models-name }} for AI app and agent development, {{
    speechsense-name }} for speech analytics, and {{ datalens-name }} as the BI
    system.
