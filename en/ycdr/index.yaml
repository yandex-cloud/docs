title: '{{ ycdr-full-name }}'
description:
  - >-
    {{ ycdr-full-name }} enables monitoring and responding to {{ yandex-cloud }}
    infrastructure incidents.  {{ ycdr-name }} is built around {{ yandex-cloud
    }}'s in-house Security Operations Center (SOC).  It collects data from the
    cloud infrastructure to detect anomalies. When {{ ycdr-name }} detects an
    anomaly, it creates an <a
    href="https://yandex.cloud/en/docs/security-deck/concepts/alerts">alert</a>
    indicating a potential incident.
meta:
  title: '{{ ycdr-full-name }}'
  description: >-
    {{ ycdr-full-name }} collects the infrastructure settings data of your {{
    yandex-cloud }} services.
