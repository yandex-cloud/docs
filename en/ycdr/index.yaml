title: '{{ ycdr-full-name }}'
description:
  - >-
    {{ ycdr-full-name }} enables monitoring and response to {{ yandex-cloud }}
    infrastructure incidents.  {{ ycdr-name }} is developed based on {{
    yandex-cloud }}'s in-house Security Operations Center (SOC).  It collects
    data from the cloud infrastructure to detect anomalies. When {{ ycdr-name }}
    detects an anomaly, it creates an <a
    href="https://yandex.cloud/en/docs/security-deck/concepts/alerts">alert</a>
    indicating a potential incident.
meta:
  title: '{{ ycdr-full-name }}'
  description: >-
    {{ ycdr-full-name }} collects the infrastructure settings data of your {{
    yandex-cloud }} services.
links:
  - title: Concepts
    description: Learn about its concepts and resources
    href: concepts/
  - title: Access management
    description: Configure access permissions for the service
    href: security/
