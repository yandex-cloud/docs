blocks:
  - type: card-layout-block
    title: Yandex Cloud overview
    description: >-
      Yandex Cloud is a suite of connected services allowing you to quickly and
      securely get as much computing power as you need on a pay-as-you-go basis.
      You access the computing power over the internet. This approach to
      computing resource consumption is called _cloud computing_.


      Cloud computing can replace or complement traditional on-premise data
      centers.


      Yandex Cloud undertakes to maintain the health and performance of the
      cloud platform's hardware and software.
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    children:
      - type: basic-card
        title: Getting started
        text: Getting started with Yandex Cloud
        urlTitle: Getting started with Yandex Cloud
        url: quickstart
        border: shadow
        controlPosition: content
        animated: false
        size: s
        icon:
          light: assets/icons/rocket.svg
          dark: assets/icons/rocket.svg
      - type: basic-card
        title: Regions
