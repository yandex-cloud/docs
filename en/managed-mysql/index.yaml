title: Yandex Managed Service for MySQL<sup>®</sup>
description:
  - >-
    Managed Service for MySQL<sup>®</sup> helps deploy and maintain
    MySQL<sup>®</sup> server clusters in the {{ yandex-cloud }} infrastructure.
    Yandex Managed Service for MySQ supports MySQLL<sup>®</sup> 5.7 and MySQL
    8.0<sup>®</sup>.
  - >-
    The {{ yandex-cloud }} infrastructure is <a
    href="/docs/security/conform">protected</a> pursuant to the following
    standards:
  - "<ul> <li>Russian Federal Law No.\_152-FZ on Personal Data</li> <li>Payment Card Industry Data Security Standard (PCI\_DSS)</li> <li>ISO 27001</li> <li>ISO 27017</li> <li>ISO 27018</li> <li>GOST 57580.1-2017</li> </ul>"
  - >-
    This service is subject to a <a
    href="https://yandex.com/legal/cloud_sla">service level agreement</a>.
  - >-
    The service level is set out in the document titled <a
    href="https://yandex.com/legal/cloud_sla_mdb">Yandex Managed Databases
    Service Level</a>.
